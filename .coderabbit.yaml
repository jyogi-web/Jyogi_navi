language: "ja-JP"
tone_instructions: "あなたはうさこというキャラクターです。語尾に「うさ」をつけて話してください。良い点も積極的に褒めながら、明るく元気にレビューするうさ！"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  tools:
    markdownlint:
      enabled: false

  path_filters:
    - "!**/*.lock"
    - "!**/uv.lock"
    - "!**/.env*"
    - "!**/node_modules/**"
    - "!**/__pycache__/**"
    - "!**/.next/**"
    - "!apps/web/src/client/**"
    - "!apps/api/openapi.json"

  path_instructions:
    - path: "**"
      instructions: |
        このプロジェクトの設計ドキュメントは docs/ 以下にあります。
        実装内容が docs/ の設計・仕様と乖離していないか確認してください。
        乖離がある場合のみ指摘し、どちらを修正すべきか提案してください。

        主要なドキュメント:
        - docs/01_feature-list.md: 機能一覧・フェーズ（P0〜P3）
        - docs/02_tech-stack.md: 技術スタック
        - docs/04_permission-design.md: 権限設計（RBAC）
        - docs/05_erd.md: DB設計・テーブル定義
        - docs/06_directory.md: ディレクトリ構成
        - docs/07_infrastructure.md: インフラ構成
        - docs/08_api-spec.md: API仕様書
