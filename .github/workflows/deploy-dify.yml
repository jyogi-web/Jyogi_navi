name: Deploy Dify (self-hosted runner on home PC)

on:
  push:
    branches:
      - main
    paths:
      - 'infra/dify/**'
      - '.github/workflows/deploy-dify.yml'

jobs:
  deploy-dify:
    runs-on: [self-hosted, dify]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check docker-compose.yml syntax
        run: |
          cd infra/dify
          docker-compose --env-file .env config > /dev/null
          echo "✅ docker-compose.yml syntax OK"

      - name: Validate CORS settings
        run: |
          cd infra/dify
          if [ -f ".env" ]; then
            set -a
            . ./.env
            set +a
          fi

          effective_env="${DEPLOY_ENV:-docker}"
          effective_cors="${CORS_ORIGINS:-}"

          if [ "$effective_env" != "development" ] && [ "$effective_cors" = "*" ]; then
            echo "❌ CORS_ORIGINS='*' is not allowed outside development"
            exit 1
          fi

          echo "✅ CORS settings validated"

      - name: Pull pinned images
        run: |
          cd infra/dify
          docker-compose --env-file .env pull

      - name: Start Dify services
        run: |
          cd infra/dify
          docker-compose --env-file .env up -d

      - name: Wait for Dify API to be healthy
        run: |
          cd infra/dify
          for i in {1..30}; do
            if docker-compose exec -T dify-api curl -f http://localhost:5001/health > /dev/null 2>&1; then
              echo "✅ Dify API is healthy"
              exit 0
            fi
            echo "Attempt $i: Waiting for Dify API..."
            sleep 10
          done
          echo "❌ Dify API health check failed"
          exit 1

      - name: Verify services are running
        run: |
          cd infra/dify
          services=$(docker-compose ps --services)
          timeout_seconds=180
          interval_seconds=10
          elapsed=0

          while [ "$elapsed" -lt "$timeout_seconds" ]; do
            all_ok=true

            for service in $services; do
              container_id=$(docker-compose ps -q "$service")

              if [ -z "$container_id" ]; then
                echo "Service '$service' has no container yet"
                all_ok=false
                continue
              fi

              status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
              echo "Service '$service' status: $status"

              if [ "$status" != "healthy" ] && [ "$status" != "running" ]; then
                all_ok=false
              fi
            done

            if [ "$all_ok" = true ]; then
              echo "✅ All services are running"
              exit 0
            fi

            echo "Waiting for all services to become healthy/running... ($elapsed/$timeout_seconds)"
            sleep "$interval_seconds"
            elapsed=$((elapsed + interval_seconds))
          done

          echo "❌ Some services are not healthy/running after timeout"
          docker-compose ps
          exit 1

      - name: Cleanup old docker assets
        run: |
          cd infra/dify
          docker-compose down --volumes --remove-orphans
          echo "✅ Cleanup completed"
