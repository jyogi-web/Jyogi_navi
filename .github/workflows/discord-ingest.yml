name: Discord Log Ingest

on:
  schedule:
    # 毎週月曜 09:00 JST（= 00:00 UTC）に実行
    - cron: "0 0 * * 1"
  workflow_dispatch:
    # 手動実行も可能

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/ingest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Write TiDB CA certificate
        env:
          TIDB_SSL_CA_CONTENT: ${{ secrets.TIDB_SSL_CA }}
        run: |
          if [ -n "$TIDB_SSL_CA_CONTENT" ]; then
            echo "$TIDB_SSL_CA_CONTENT" > /tmp/tidb_ca.pem && chmod 600 /tmp/tidb_ca.pem
          fi

      - name: Run ingest pipeline
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          DIFY_API_URL: ${{ secrets.DIFY_API_URL }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
          TIDB_SSL_CA: ${{ secrets.TIDB_SSL_CA != '' && '/tmp/tidb_ca.pem' || '' }}
        run: uv run discord/run.py
