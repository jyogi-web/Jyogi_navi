name: Check OpenAPI Schema Drift

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/src/client/**"
      - "apps/web/openapi-ts.config.ts"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/check-openapi.yml"

jobs:
  check-drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "apps/api/.python-version"

      - name: Install Python dependencies
        working-directory: apps/api
        run: uv sync --dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI schema and TypeScript client
        env:
          TIDB_HOST: ""
          TIDB_USER: ""
          TIDB_PASSWORD: ""
          TIDB_DATABASE: ""
          TIDB_PORT: "4000"
          SUPABASE_URL: ""
          SUPABASE_SECRET: ""
          APP_ENV: "development"
        run: pnpm openapi

      - name: Check for schema drift
        run: |
          if git diff --exit-code apps/api/openapi.json apps/web/src/client/; then
            echo "No schema drift detected."
          else
            echo ""
            echo "ERROR: Schema drift detected!"
            echo "The following files are out of sync:"
            git diff --name-only apps/api/openapi.json apps/web/src/client/
            echo ""
            echo "Run 'pnpm generate' locally and commit the generated files."
            exit 1
          fi
